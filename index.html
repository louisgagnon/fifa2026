<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA 2026 - Group Stage</title>
<style>
  :root {
    --bg: #0a0f1e; --surface: #131929; --card: #1a2236; --border: #2a3650;
    --accent: #d4a017; --gold: #f0c040; --text: #e8eaf0; --muted: #7a8aaa;
    --green: #2ecc71; --red: #e74c3c; --blue: #3498db; --live: #ff4444;
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  header { background: linear-gradient(135deg, #0a0f1e 0%, #1a2a4a 50%, #0a0f1e 100%); border-bottom: 2px solid var(--accent); padding: 18px 24px 14px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .trophy { font-size: 2.2rem; }
  .header-title h1 { font-size: 1.4rem; font-weight: 800; background: linear-gradient(90deg, #f0c040, #fff, #f0c040); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .header-title p { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }
  .header-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  #status-pill { font-size: 0.72rem; font-weight: 600; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 20px; padding: 5px 12px; color: var(--muted); transition: color .3s, border-color .3s; }
  #status-pill.ok { color: var(--green); border-color: var(--green); }
  #status-pill.err { color: var(--red); border-color: var(--red); }
  #status-pill.live { color: var(--live); border-color: var(--live); }
  #refresh-btn { background: var(--accent); color: #000; border: none; border-radius: 20px; padding: 6px 16px; font-size: 0.75rem; font-weight: 700; cursor: pointer; }
  .groups-nav { display: flex; gap: 6px; padding: 14px 20px 0; overflow-x: auto; scrollbar-width: none; flex-wrap: wrap; }
  .group-tab { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 6px 14px; font-size: 0.75rem; font-weight: 700; color: var(--muted); cursor: pointer; white-space: nowrap; }
  .group-tab.active { background: var(--accent); border-color: var(--accent); color: #000; }
  .group-tab .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--live); margin-left: 5px; vertical-align: middle; animation: pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  main { padding: 14px 20px 40px; max-width: 980px; margin: 0 auto; }
  .group-section { display: none; }
  .group-section.visible { display: block; }
  .group-header { margin: 18px 0 12px; }
  .group-header h2 { font-size: 1.2rem; font-weight: 800; color: var(--gold); }
  .standings { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 14px; overflow: hidden; }
  .standings-title { font-size: 0.66rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); padding: 7px 14px; border-bottom: 1px solid var(--border); }
  .standings table { width: 100%; border-collapse: collapse; font-size: 0.78rem; }
  .standings th { padding: 5px 10px; text-align: center; font-size: 0.65rem; color: var(--muted); font-weight: 600; border-bottom: 1px solid var(--border); }
  .standings th:first-child { text-align: left; padding-left: 14px; }
  .standings td { padding: 7px 10px; text-align: center; border-bottom: 1px solid rgba(42,54,80,0.45); }
  .standings td:first-child { text-align: left; font-weight: 600; padding-left: 14px; }
  .standings tr:last-child td { border-bottom: none; }
  .standings tr.qualify td:first-child { border-left: 3px solid var(--green); }
  .pts-cell { font-weight: 800; color: var(--gold); }
  .matches-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
  @media (min-width: 620px) { .matches-grid { grid-template-columns: 1fr 1fr; } }
  .match-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 13px 15px; }
  .match-card.final { border-left: 3px solid var(--green); }
  .match-card.upcoming { border-left: 3px solid var(--blue); }
  .match-card.live { border-left: 3px solid var(--live); animation: glow 2s ease-in-out infinite; }
  @keyframes glow { 0%,100%{box-shadow:0 0 0 0 rgba(255,68,68,0)} 50%{box-shadow:0 0 8px 2px rgba(255,68,68,.25)} }
  .match-meta { display: flex; align-items: center; justify-content: space-between; margin-bottom: 9px; }
  .match-date { font-size: 0.68rem; color: var(--muted); font-weight: 600; text-transform: uppercase; }
  .badge { font-size: 0.62rem; font-weight: 800; letter-spacing: 0.7px; text-transform: uppercase; padding: 2px 8px; border-radius: 4px; }
  .badge.final { background: rgba(46,204,113,.15); color: var(--green); }
  .badge.upcoming { background: rgba(52,152,219,.15); color: var(--blue); }
  .badge.live { background: rgba(255,68,68,.18); color: var(--live); }
  .match-teams { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .team { display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; }
  .team-flag { font-size: 1.55rem; line-height: 1; }
  .team-name { font-size: 0.74rem; font-weight: 700; text-align: center; line-height: 1.2; }
  .score-block { display: flex; flex-direction: column; align-items: center; gap: 3px; min-width: 62px; }
  .score-display { font-size: 1.55rem; font-weight: 900; letter-spacing: 2px; color: var(--gold); }
  .score-display.live { color: var(--live); }
  .score-clock { font-size: 0.65rem; color: var(--live); font-weight: 700; }
  .score-time { font-size: 0.65rem; color: var(--blue); font-weight: 600; text-align: center; }
  .vs-text { font-size: 0.85rem; color: var(--muted); font-weight: 600; }
  .match-venue { margin-top: 9px; font-size: 0.65rem; color: var(--muted); }
  #loader { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 40vh; gap: 16px; }
  .loader-spinner { width: 42px; height: 42px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loader p { color: var(--muted); font-size: 0.85rem; }
  #error-box { display: none; background: rgba(231,76,60,.1); border: 1px solid rgba(231,76,60,.4); border-radius: var(--radius); padding: 16px 20px; margin: 20px; font-size: 0.82rem; color: #e88; }
  footer { text-align: center; font-size: 0.67rem; color: var(--muted); padding: 16px; border-top: 1px solid var(--border); }
</style>
</head>
<body>
<header>
  <div class="header-left">
    <div class="trophy">&#127942;</div>
    <div class="header-title">
      <h1>FIFA World Cup 2026 &mdash; Group Stage</h1>
      <p>USA &middot; Canada &middot; Mexico &nbsp;|&nbsp; Jun 11 &ndash; Jun 27, 2026</p>
    </div>
  </div>
  <div class="header-right">
    <div id="status-pill">Loading&hellip;</div>
    <button id="refresh-btn" onclick="load(true)">&#8635; Refresh</button>
  </div>
</header>
<nav class="groups-nav" id="groups-nav"></nav>
<main id="main">
  <div id="loader"><div class="loader-spinner"></div><p>Fetching live data from ESPN&hellip;</p></div>
  <div id="error-box"></div>
  <div id="content"></div>
</main>
<footer>Data: ESPN public API &middot; Auto-refreshes every 60s &middot; Last updated: <span id="last-updated">&mdash;</span></footer>
<script>
const GROUP_DATES = ['20260611','20260612','20260613','20260614','20260615','20260616','20260617','20260618','20260619','20260620','20260621','20260622','20260623','20260624','20260625','20260626','20260627'];
const API = d => `https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?limit=50&dates=${d}`;
const FLAGS = {'Mexico':'馃嚥馃嚱','South Africa':'馃嚳馃嚘','South Korea':'馃嚢馃嚪','Korea Republic':'馃嚢馃嚪','Czechia':'馃嚚馃嚳','Czech Republic':'馃嚚馃嚳','Canada':'馃嚚馃嚘','Bosnia-Herzegovina':'馃嚙馃嚘','Switzerland':'馃嚚馃嚟','Qatar':'馃嚩馃嚘','Brazil':'馃嚙馃嚪','Morocco':'馃嚥馃嚘','Scotland':'馃彺鬆仹鬆仮鬆伋鬆仯鬆伌鬆伩','Haiti':'馃嚟馃嚬','United States':'馃嚭馃嚫','Paraguay':'馃嚨馃嚲','Australia':'馃嚘馃嚭','Turkiye':'馃嚬馃嚪','Turkey':'馃嚬馃嚪','Germany':'馃嚛馃嚜','Curazao':'馃嚚馃嚰','Curacao':'馃嚚馃嚰','Ivory Coast':'馃嚚馃嚠',"Cote d'Ivoire":'馃嚚馃嚠','Ecuador':'馃嚜馃嚚','Netherlands':'馃嚦馃嚤','Japan':'馃嚡馃嚨','Sweden':'馃嚫馃嚜','Tunisia':'馃嚬馃嚦','Belgium':'馃嚙馃嚜','Egypt':'馃嚜馃嚞','Iran':'馃嚠馃嚪','New Zealand':'馃嚦馃嚳','Spain':'馃嚜馃嚫','Cape Verde':'馃嚚馃嚮','Saudi Arabia':'馃嚫馃嚘','Uruguay':'馃嚭馃嚲','France':'馃嚝馃嚪','Senegal':'馃嚫馃嚦','Norway':'馃嚦馃嚧','Iraq':'馃嚠馃嚩','Argentina':'馃嚘馃嚪','Algeria':'馃嚛馃嚳','Austria':'馃嚘馃嚬','Jordan':'馃嚡馃嚧','Portugal':'馃嚨馃嚬','DR Congo':'馃嚚馃嚛','Congo DR':'馃嚚馃嚛','Uzbekistan':'馃嚭馃嚳','Colombia':'馃嚚馃嚧','England':'馃彺鬆仹鬆仮鬆仴鬆伄鬆仹鬆伩','Croatia':'馃嚟馃嚪','Ghana':'馃嚞馃嚟','Panama':'馃嚨馃嚘'};
const flag = n => FLAGS[n] || '馃寪';
let allEvents = [], activeGroup = 'All';

async function fetchDay(d) {
  const r = await fetch(API(d), {cache:'no-store'});
  if (!r.ok) throw new Error(r.status);
  return r.json();
}

function parseEvents(data) {
  return (data.events||[]).map(ev => {
    const comp = ev.competitions?.[0]; if (!comp) return null;
    const home = comp.competitors?.find(c=>c.homeAway==='home')||comp.competitors?.[0];
    const away = comp.competitors?.find(c=>c.homeAway==='away')||comp.competitors?.[1];
    if (!home||!away) return null;
    const st = comp.status||{}, sn = st.type?.name||'', sd = st.type?.description||'';
    const isFinal = sn.includes('FINAL')||sd.toLowerCase().includes('final')||sd.toLowerCase().includes('full time');
    const isLive  = sn.includes('IN_PROGRESS')||sd.toLowerCase().includes('progress')||sd.toLowerCase().includes('halftime');
    const hg = parseInt(home.score,10), ag = parseInt(away.score,10);
    const dateObj = new Date(ev.date);
    const altNote = comp.altGameNote||'';
    return {
      id: ev.id, group: altNote.match(/Groups+[A-Z]/i)?.[0]||'?',
      date: dateObj.toLocaleDateString('en-US',{month:'short',day:'numeric',timeZone:'America/New_York'}),
      dateObj, homeName: home.team?.displayName||'?', awayName: away.team?.displayName||'?',
      homeScore: isNaN(hg)?null:hg, awayScore: isNaN(ag)?null:ag,
      status: isFinal?'final':isLive?'live':'upcoming',
      clock: isLive?st.displayClock:null,
      time: (!isFinal&&!isLive)?dateObj.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',timeZoneName:'short',timeZone:'America/New_York'}):null,
      venueName: comp.venue?.fullName||'', city: comp.venue?.address?.city||''
    };
  }).filter(Boolean);
}

function calcStandings(ms) {
  const t={};
  const en=n=>{if(!t[n])t[n]={W:0,D:0,L:0,GF:0,GA:0,Pts:0,MP:0};};
  for(const m of ms){
    if(m.status!=='final'||m.homeScore==null)continue;
    en(m.homeName);en(m.awayName);
    t[m.homeName].MP++;t[m.awayName].MP++;
    t[m.homeName].GF+=m.homeScore;t[m.homeName].GA+=m.awayScore;
    t[m.awayName].GF+=m.awayScore;t[m.awayName].GA+=m.homeScore;
    if(m.homeScore>m.awayScore){t[m.homeName].W++;t[m.homeName].Pts+=3;t[m.awayName].L++;}
    else if(m.homeScore<m.awayScore){t[m.awayName].W++;t[m.awayName].Pts+=3;t[m.homeName].L++;}
    else{t[m.homeName].D++;t[m.homeName].Pts++;t[m.awayName].D++;t[m.awayName].Pts++;}
  }
  return Object.entries(t).map(([n,s])=>({name:n,...s,GD:s.GF-s.GA}))
    .sort((a,b)=>b.Pts-a.Pts||b.GD-a.GD||b.GF-a.GF||a.name.localeCompare(b.name));
}

function groups(evs) {
  const seen=new Set(),out=[];
  for(const e of [...evs].sort((a,b)=>a.dateObj-b.dateObj))if(!seen.has(e.group)){seen.add(e.group);out.push(e.group);}
  return['All',...out.sort((a,b)=>a.replace('Group ','').localeCompare(b.replace('Group ','')))];
}

function renderNav(gs,evs) {
  const nav=document.getElementById('groups-nav');nav.innerHTML='';
  for(const g of gs){
    const live=(g==='All'?evs:evs.filter(e=>e.group===g)).some(e=>e.status==='live');
    const btn=document.createElement('button');
    btn.className='group-tab'+(g===activeGroup?' active':'');
    btn.innerHTML=g+(live?'<span class="dot"></span>':'');
    btn.onclick=()=>switchGroup(g);nav.appendChild(btn);
  }
}

function switchGroup(g) {
  activeGroup=g;
  renderNav(groups(allEvents),allEvents);
  document.querySelectorAll('.group-section').forEach(s=>s.classList.toggle('visible',s.dataset.group===g));
}

function renderAll(evs) {
  const content=document.getElementById('content');content.innerHTML='';
  const gs=groups(evs);renderNav(gs,evs);
  const ugs=gs.filter(g=>g!=='All');
  const allSec=document.createElement('div');
  allSec.className='group-section'+(activeGroup==='All'?' visible':'');
  allSec.dataset.group='All';
  for(const g of ugs){
    const b=document.createElement('div');b.style.marginBottom='28px';
    b.innerHTML=groupHTML(g,evs.filter(e=>e.group===g));allSec.appendChild(b);
  }
  content.appendChild(allSec);
  for(const g of ugs){
    const sec=document.createElement('div');
    sec.className='group-section'+(activeGroup===g?' visible':'');
    sec.dataset.group=g;sec.innerHTML=groupHTML(g,evs.filter(e=>e.group===g));
    content.appendChild(sec);
  }
}

function groupHTML(g,evs) {
  const st=calcStandings(evs),sorted=[...evs].sort((a,b)=>a.dateObj-b.dateObj);
  return `<div class="group-header"><h2>${g}</h2></div>${st.length?standingsHTML(st):''}<div class="matches-grid">${sorted.map(matchCard).join('')}</div>`;
}

function standingsHTML(teams) {
  return `<div class="standings"><div class="standings-title">Standings &middot; top 2 qualify</div><table><thead><tr><th style="text-align:left">Team</th><th>MP</th><th>W</th><th>D</th><th>L</th><th>GF</th><th>GA</th><th>GD</th><th>Pts</th></tr></thead><tbody>${teams.map((t,i)=>`<tr class="${i<2?'qualify':''}"><td>${flag(t.name)} ${t.name}</td><td>${t.MP}</td><td>${t.W}</td><td>${t.D}</td><td>${t.L}</td><td>${t.GF}</td><td>${t.GA}</td><td>${t.GD>0?'+':''}${t.GD}</td><td class="pts-cell">${t.Pts}</td></tr>`).join('')}</tbody></table></div>`;
}
